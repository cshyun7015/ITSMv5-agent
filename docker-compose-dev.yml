services:
  mariadb-dev:
    image: mariadb:10.11
    container_name: mariadb-dev
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-system_mgmt}
      MARIADB_USER: ${DB_USER:-itsm}
      MARIADB_PASSWORD: ${DB_PASSWORD:-itsm1234}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  internal-dev:
    driver: bridge

volumes:
  db_data:
