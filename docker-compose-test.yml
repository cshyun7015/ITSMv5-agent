services:
  mariadb-test:
    image: mariadb:10.11
    container_name: mariadb-test
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-system_mgmt}
      MARIADB_USER: ${DB_USER:-itsm}
      MARIADB_PASSWORD: ${DB_PASSWORD:-itsm1234}
    volumes:
      - mariadb-test_data:/var/lib/mysql
    networks:
      - internal-test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: ./backend-system
      dockerfile: Dockerfile
    container_name: backend-test
    restart: on-failure
    depends_on:
      mariadb-test:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb-test:3306/${DB_NAME:-system_mgmt}?characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-itsm}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-itsm1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/ansible:/ansible
    networks:
      - internal-test

  frontend-oper-test:
    build:
      context: ./frontend-oper
      dockerfile: Dockerfile
    container_name: frontend-oper-test
    restart: always
    depends_on:
      - backend-test
    ports:
      - "8082:80"
    networks:
      - internal-test

  frontend-user-test:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: frontend-user-test
    restart: always
    depends_on:
      - backend-test
    ports:
      - "8083:80"
    networks:
      - internal-test

  # --- Observability Stack (LGTM) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal-test

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - internal-test

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./infra/monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - internal-test

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal-test

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - internal-test
    depends_on:
      - prometheus
      - loki
      - frontend-oper-test
      - frontend-user-test

  ansible:
    build:
      context: ./infra/ansible
      dockerfile: Dockerfile
    container_name: ansible
    volumes:
      - ./infra/ansible:/ansible
      - ./infra/ansible/ssh/id_rsa:/root/.ssh/id_rsa:ro
      - ./infra/ansible/ssh/id_rsa.pub:/root/.ssh/id_rsa.pub:ro
    working_dir: /ansible
    environment:
      - ANSIBLE_CONFIG=/ansible/ansible.cfg
    networks:
      - internal-test
    # Keeping the container alive for execution
    command: tail -f /dev/null

networks:
  internal-test:
    driver: bridge

volumes:
  mariadb-test_data: